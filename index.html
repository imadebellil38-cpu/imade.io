<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050510">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>EmpireTrack</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="offline-banner" class="offline-banner hidden">
    <span class="offline-dot"></span>
    Mode hors ligne
  </div>
  <div id="app"></div>
  <nav id="navbar" class="hidden"></nav>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(function(reg) {
          console.log('SW registered, scope:', reg.scope);
        })
        .catch(function(err) {
          console.warn('SW registration failed:', err);
        });

      // Listen for messages from SW
      navigator.serviceWorker.addEventListener('message', function(event) {
        if (event.data?.type === 'SYNC_QUEUED') {
          console.log('Requests queued for sync:', event.data.count);
        }
        if (event.data?.type === 'SYNC_COMPLETE') {
          console.log('Sync complete:', event.data.replayed, 'replayed,', event.data.remaining, 'remaining');
        }
      });
    }

    // Offline indicator
    function updateOnlineStatus() {
      var banner = document.getElementById('offline-banner');
      if (!banner) return;
      if (navigator.onLine) {
        banner.classList.add('hidden');
        // Replay queued requests when back online
        if (navigator.serviceWorker && navigator.serviceWorker.controller) {
          navigator.serviceWorker.controller.postMessage({ type: 'REPLAY_QUEUE' });
        }
      } else {
        banner.classList.remove('hidden');
      }
    }
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    // Auto-reload when coming back from background after inactivity
    var lastVisible = Date.now();
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible') {
        updateOnlineStatus();
        var elapsed = Date.now() - lastVisible;
        // If away for more than 60 seconds, hard reload to reset Supabase connection
        if (elapsed > 60000) {
          location.reload();
        }
      } else {
        lastVisible = Date.now();
      }
    });
  </script>
  <script type="module">
    import('./js/app.js');
  </script>
</body>
</html>
