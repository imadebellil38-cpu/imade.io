<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EmpireTrack - Logos v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;color:#fff;font-family:sans-serif;padding:16px}
h1{text-align:center;font-size:1.1rem;color:#00ff88;margin-bottom:4px}
p{text-align:center;color:rgba(255,255,255,0.4);font-size:0.75rem;margin-bottom:16px}
.grid{display:flex;flex-direction:column;gap:10px;max-width:420px;margin:0 auto}
.card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:14px;overflow:hidden;position:relative}
.card img{width:100%;display:block}
.num{position:absolute;top:8px;left:12px;font-size:1.2rem;font-weight:900;color:rgba(0,255,136,0.3)}
</style>
</head>
<body>
<h1>EmpireTrack — Logos v2</h1>
<p>Dis-moi le numéro</p>
<div class="grid">
<div class="card"><span class="num">1</span><img src="assets/logos/v2-1.png" alt="Logo 1"></div>
<div class="card"><span class="num">2</span><img src="assets/logos/v2-2.png" alt="Logo 2"></div>
<div class="card"><span class="num">3</span><img src="assets/logos/v2-3.png" alt="Logo 3"></div>
<div class="card"><span class="num">4</span><img src="assets/logos/v2-4.png" alt="Logo 4"></div>
<div class="card"><span class="num">5</span><img src="assets/logos/v2-5.png" alt="Logo 5"></div>
<div class="card"><span class="num">6</span><img src="assets/logos/v2-6.png" alt="Logo 6"></div>
<div class="card"><span class="num">7</span><img src="assets/logos/v2-7.png" alt="Logo 7"></div>
<div class="card"><span class="num">8</span><img src="assets/logos/v2-8.png" alt="Logo 8"></div>
<div class="card"><span class="num">9</span><img src="assets/logos/v2-9.png" alt="Logo 9"></div>
<div class="card"><span class="num">10</span><img src="assets/logos/v2-10.png" alt="Logo 10"></div>
</div></body></html>
